<div class="lg:hidden fixed top-0 left-0 w-full bg-slate-900 border-b border-slate-800 z-[60] px-4 h-16 flex items-center">
    <button (click)="toggleSidebar()" class="p-2 -ml-2 text-slate-400 hover:text-white">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            @if (!isSidebarOpen) {
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" />
            } @else {
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            }
        </svg>
    </button>
    <div class="ml-2 flex items-center gap-2">
        <img src="logo.png" class="w-8 h-8 object-contain" alt="Logo">
        <span class="text-white font-bold text-sm tracking-tight">ProsperaFinWealth</span>
    </div>
</div>

@if (isSidebarOpen) {
    <div (click)="toggleSidebar()" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 lg:hidden"></div>
}

<aside 
    [class.translate-x-0]="isSidebarOpen" 
    [class.-translate-x-full]="!isSidebarOpen"
    class="fixed inset-y-0 left-0 w-72 bg-slate-900 flex flex-col border-r border-slate-800 z-50 transition-transform duration-300 ease-in-out lg:translate-x-0 lg:static lg:flex">
    
    <div class="h-20 flex items-center px-8 border-b border-slate-800/50">
        <a href="/home">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-900/40">
                   <img src="logo.png" alt="">
                </div>
                <span class="text-xl font-bold tracking-tight text-white">ProsperaFinWealth</span>
            </div>
        </a>
    </div>

    <nav class="flex-1 px-4 py-6 space-y-7 overflow-y-auto custom-scrollbar">
        <div>
            <p class="px-4 text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-3">Insights</p>
            <div class="space-y-1">
                <a routerLink="/investor/dashboard" routerLinkActive="bg-blue-600 text-white shadow-lg"
                    class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-slate-400 hover:text-white hover:bg-slate-800 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                    </svg>
                    Overview
                </a>
            </div>
        </div>

        <div>
            <p class="px-4 text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-3">Growth</p>
            <div class="space-y-1">
                <a routerLink="/investor/plans" routerLinkActive="bg-blue-600 text-white shadow-md"
                    class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-slate-400 hover:text-white hover:bg-slate-800 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                    </svg>
                    Explore Plans
                </a>
                <a routerLink="/investor/portfolio" routerLinkActive="bg-blue-600 text-white shadow-md"
                    class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-slate-400 hover:text-white hover:bg-slate-800 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                    </svg>
                    My Investments
                </a>
            </div>
        </div>

        <div>
            <p class="px-4 text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-3">Treasury</p>
            <div class="space-y-1">
                <a routerLink="/investor/wallet" routerLinkActive="bg-blue-600 text-white shadow-md"
                    class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-slate-400 hover:text-white hover:bg-slate-800 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
                    </svg>
                    Wallet & Funding
                </a>
                <a routerLink="/investor/ledger" routerLinkActive="bg-blue-600 text-white shadow-md"
                    class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-slate-400 hover:text-white hover:bg-slate-800 transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 00-2 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                    </svg>
                    Audit Logs
                </a>
            </div>
        </div>

        <div>
            <p class="px-4 text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mb-3">Verification</p>
            <div class="space-y-1">
                <a routerLink="/investor/kyc" routerLinkActive="bg-blue-600 text-white shadow-md"
                    class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-semibold text-slate-400 hover:text-white hover:bg-slate-800 transition-all group">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                    </svg>
                    Identity Center
                </a>
            </div>
        </div>
    </nav>

    <div class="p-6 border-t border-slate-800 bg-slate-900/50">
        <button (click)="onLogout()"
            class="cursor-pointer w-full flex items-center justify-center gap-2 py-3 bg-rose-500/10 hover:bg-rose-500 text-rose-500 hover:text-white rounded-xl text-sm font-bold transition-all">
            Sign Out
        </button>
    </div>
</aside>
