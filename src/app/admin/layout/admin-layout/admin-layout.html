<div class="h-screen w-full flex overflow-hidden bg-slate-50 relative">
  
    <div *ngIf="isSidebarOpen" 
         (click)="isSidebarOpen = false"
         class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-40 lg:hidden transition-opacity">
    </div>

    <aside [class.translate-x-0]="isSidebarOpen"
           [class.-translate-x-full]="!isSidebarOpen"
           class="fixed inset-y-0 left-0 w-72 lg:static lg:translate-x-0 z-50 transition-transform duration-300 ease-in-out shrink-0">
        <app-sidebar class="h-full"></app-sidebar>
    </aside>
  
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <header class="h-16 bg-white flex items-center justify-between px-6 border-b border-slate-200 z-30 shrink-0">
            <div class="flex items-center gap-4">
                <button (click)="isSidebarOpen = true" class="lg:hidden p-2 -ml-2 text-slate-600 hover:bg-slate-100 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
                <div class="text-sm font-bold text-slate-800">Admin Dashboard</div>
            </div>

            <div class="flex items-center gap-3">
                <div class="hidden sm:block text-right">
                    <p class="text-xs font-bold text-slate-900 leading-none">Super Admin</p>
                    <p class="text-[10px] text-emerald-500 font-medium mt-1">Online</p>
                </div>
                <div class="w-10 h-10 rounded-full bg-slate-100 border-2 border-white shadow-sm flex items-center justify-center font-bold text-slate-700">
                    SA
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar">
            <div class="max-w-7xl mx-auto">
                <router-outlet></router-outlet>
            </div>
        </main>
    </div>
</div>
